<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>単語コンクール対策アプリ</title>
  <style>
    /* ＝＝＝ ダークモードのスタイル（画面表示用） ＝＝＝ */
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background: linear-gradient(135deg, #141e30 0%, #243b55 100%);
      color: #e0e0e0;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: rgba(30, 35, 45, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.1);
      width: 90%;
      max-width: 550px;
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
      text-align: center;
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 1.8rem;
      color: #00f2fe;
      margin-bottom: 25px;
      letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
    }

    h2 {
      color: #4facfe;
    }

    .hidden {
      display: none !important;
    }

    /* ＝＝＝ ボタンのスタイル ＝＝＝ */
    button {
      border: none;
      padding: 15px 20px;
      margin: 10px 0;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      color: white;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      transition: all 0.3s ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
    }

    button:active:not(:disabled) {
      transform: translateY(1px);
    }

    .btn-primary {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      color: #000;
    }

    .btn-success {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      color: #000;
    }

    .btn-secondary {
      background: linear-gradient(135deg, #434343 0%, #000000 100%);
      border: 1px solid #555;
    }

    .btn-warning {
      background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
      color: #000;
    }

    .btn-danger {
      background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%);
    }

    .btn-sparta {
      background: linear-gradient(135deg, #6b0f1a 0%, #2b0307 100%);
      border: 1px solid #ff0844;
      box-shadow: 0 0 15px rgba(255, 8, 68, 0.3);
    }

    .btn-interrupt {
      margin-top: 30px;
      font-size: 0.9rem;
      padding: 10px;
    }

    button:disabled {
      background: #333;
      color: #777;
      box-shadow: none;
      cursor: not-allowed;
      border: 1px solid #444;
    }

    /* ＝＝＝ プレイ画面のスタイル ＝＝＝ */
    #ja-text {
      font-size: 2rem;
      font-weight: bold;
      margin: 25px 0;
      color: #ffffff;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }

    .input-wrapper {
      position: relative;
      width: 100%;
      margin-bottom: 20px;
    }

    .visual-text {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 2;
      font-size: 1.4rem;
      font-family: 'Courier New', Consolas, monospace;
      letter-spacing: 1px;
      white-space: pre;
    }

    .typed-part {
      color: #00f2fe;
    }

    .ghost-part {
      color: rgba(255, 255, 255, 0.2);
    }

    .placeholder-part {
      color: #777;
    }

    .fake-cursor {
      display: inline-block;
      width: 2px;
      height: 1.4rem;
      background-color: #00f2fe;
      animation: blink 1s step-end infinite;
      margin: 0 1px;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }
    }

    input[type="text"] {
      width: 100%;
      padding: 18px;
      font-size: 1.4rem;
      font-family: 'Courier New', Consolas, monospace;
      letter-spacing: 1px;
      border: 2px solid #555;
      border-radius: 12px;
      box-sizing: border-box;
      outline: none;
      transition: all 0.3s;
      background-color: #1a1f2b;
      color: transparent;
      caret-color: transparent;
      position: relative;
      z-index: 1;
    }

    input[type="text"]:focus {
      border-color: #00f2fe;
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
    }

    #feedback {
      font-size: 1.3rem;
      font-weight: bold;
      min-height: 35px;
      margin-bottom: 20px;
    }

    .correct {
      color: #00e676;
      animation: pop 0.3s ease;
      text-shadow: 0 0 8px rgba(0, 230, 118, 0.5);
    }

    .incorrect {
      color: #ff5252;
      animation: shake 0.4s ease;
      text-shadow: 0 0 8px rgba(255, 82, 82, 0.5);
    }

    .correct-word {
      font-size: 1.5rem;
      color: #00f2fe;
    }

    .sparta-alert {
      color: #ff0844;
      font-size: 1.1rem;
      display: block;
      margin-top: 10px;
      font-weight: bold;
      text-shadow: 0 0 5px rgba(255, 8, 68, 0.8);
      animation: shake 0.4s;
    }

    @keyframes pop {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.1);
      }

      100% {
        transform: scale(1);
      }
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-5px);
      }

      75% {
        transform: translateX(5px);
      }
    }

    #progress {
      font-size: 1rem;
      color: #9ba4b5;
      font-weight: bold;
      margin-bottom: 10px;
    }

    /* ＝＝＝ メニュー・結果画面のスタイル ＝＝＝ */
    .menu-stats-text {
      color: #9ba4b5;
      font-weight: bold;
    }

    #total-word-count {
      color: #ffffff;
      font-size: 1.2rem;
    }

    .result-score-text {
      font-size: 1.2rem;
      font-weight: bold;
    }

    #score {
      color: #00e676;
      font-size: 1.5rem;
    }

    .mistake-log-title {
      color: #ff5252;
      font-weight: bold;
    }

    .mistake-word {
      color: #00f2fe;
    }

    .mistake-separator {
      border: 0;
      border-bottom: 1px solid #333;
      margin: 8px 0;
    }

    .scroll-box {
      background: #1a1f2b;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #333;
      max-height: 300px;
      overflow-y: auto;
      margin-bottom: 20px;
      text-align: left;
      font-size: 1rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 10px;
      border-bottom: 1px solid #333;
    }

    th {
      background-color: #242c3d;
      color: #4facfe;
      position: sticky;
      top: 0;
    }

    td:first-child {
      font-weight: bold;
      color: #777;
      width: 10%;
    }

    td:nth-child(2) {
      font-weight: bold;
      color: #00f2fe;
      width: 45%;
    }

    .options-card {
      background: rgba(0, 0, 0, 0.2);
      padding: 15px;
      border-radius: 12px;
      margin-top: 20px;
      border: 1px dashed #555;
      text-align: left;
    }

    .options-card h3 {
      color: #00f2fe;
      margin-top: 0;
      margin-bottom: 15px;
      font-size: 1.1rem;
      text-align: center;
    }

    .select-style {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      background: #1a1f2b;
      color: #ffffff;
      border: 1px solid #555;
      font-size: 1rem;
      outline: none;
    }

    /* ＝＝＝ 🖨️ 問題のみ・印刷用スタイル（全体の約90%に縮小） ＝＝＝ */
    #print-area {
      display: none;
    }

    @media print {

      /* 基本のフォントサイズを13pxから12pxへ微調整 */
      body {
        background: white !important;
        color: black !important;
        display: block;
        font-size: 12px;
        margin: 0;
        padding: 0;
        font-family: 'Yu Mincho', 'MS Mincho', serif;
      }

      #app-container {
        display: none !important;
      }

      #print-area {
        display: block !important;
        width: 100%;
      }

      /* 改ページ設定と全体の余白（上下の余白を少し詰める） */
      .print-page {
        page-break-after: always;
        padding: 8px 15px;
      }

      .print-page:last-child {
        page-break-after: auto;
      }

      /* テーブル全体のレイアウト（2列構成） */
      .print-flex-container {
        display: flex;
        justify-content: space-between;
      }

      .print-table {
        width: 48.5%;
        border-collapse: collapse;
        margin-bottom: 2px;
      }

      /* セルの中の余白(padding)を少し削って高さを抑える */
      .print-table th,
      .print-table td {
        border: 1px solid #000;
        padding: 4.5px 4px;
        font-size: 11.5px;
        color: black;
        line-height: 1.3;
        font-family: sans-serif;
      }

      .print-table th {
        background-color: #f0f0f0 !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
        color: black;
        font-size: 11.5px;
        text-align: center;
      }

      /* 各列の幅 */
      .print-table td:first-child {
        text-align: center;
        width: 6%;
        font-weight: bold;
      }

      .print-table td:nth-child(2) {
        width: 44%;
      }

      .print-table td:nth-child(3) {
        width: 50%;
        font-family: 'Courier New', monospace;
        font-weight: bold;
        text-align: center;
        vertical-align: middle;
      }
    }
  </style>
</head>

<body>

  <div class="container" id="app-container">
    <h1>✨ 単語コンクール対策 ✨</h1>

    <div id="menu-screen">
      <p class="menu-stats-text">出題範囲の単語数: <span id="total-word-count">0</span> 語</p>

      <button id="resume-btn" class="btn-success hidden">▶ 続きから再開</button>
      <button id="start-all-btn" class="btn-primary">▶ 全単語でスタート</button>
      <button id="start-mistake-btn" class="btn-warning" disabled>🔥 間違いリストでスタート (<span
          id="mistake-count">0</span>)</button>
      <button id="start-sparta-btn" class="btn-sparta">☠️ スパルタモード (順番通り・1ミスで終了)</button>

      <div class="options-card">
        <h3 style="color: #4facfe;">🎮 プレイ設定 (アプリ用)</h3>
        <select id="play-order" class="select-style" style="margin-bottom: 15px;">
          <option value="random">出題順： ランダム (おすすめ！)</option>
          <option value="normal">出題順： 順番通り</option>
        </select>
        <label style="display: flex; align-items: center; justify-content: center; cursor: pointer; color: #ffffff;">
          <input type="checkbox" id="tracing-mode-toggle" style="width: 20px; height: 20px; margin-right: 10px;">
          なぞり書きモード (解答をうっすら表示)
        </label>
      </div>

      <div class="options-card">
        <h3>🖨️ 本番テスト用紙を印刷</h3>
        <select id="print-scope" class="select-style">
          <option value="all">範囲： 全単語 (表:1~60 裏:61~100)</option>
          <option value="mistake">範囲： 間違いリストのみ</option>
        </select>
        <label
          style="display: flex; align-items: center; justify-content: center; cursor: pointer; color: #ffffff; margin: 10px 0;">
          <input type="checkbox" id="print-answers-toggle" style="width: 20px; height: 20px; margin-right: 10px;">
          解答（赤字）も一緒に印刷する
        </label>
        <button id="print-btn" class="btn-secondary" style="margin-top:5px; border-color:#00f2fe; color:#00f2fe;">PDF保存
          / 印刷する</button>
      </div>

      <button id="view-list-btn" class="btn-secondary" style="margin-top: 15px;">📖 全単語一覧を見る</button>
      <button id="clear-mistake-btn" class="btn-danger hidden" style="margin-top:15px;">🗑 間違いリストをリセット</button>
    </div>

    <div id="word-list-screen" class="hidden">
      <h2>全単語一覧</h2>
      <div class="scroll-box">
        <table>
          <thead>
            <tr>
              <th>No</th>
              <th>英語</th>
              <th>日本語</th>
            </tr>
          </thead>
          <tbody id="word-list-tbody"></tbody>
        </table>
      </div>
      <button class="btn-secondary back-to-menu-btn">戻る</button>
    </div>

    <div id="play-screen" class="hidden">
      <div id="progress">問題 1 / 10</div>
      <div id="ja-text">日本語</div>

      <div class="input-wrapper">
        <div id="visual-text" class="visual-text"></div>
        <input type="text" id="en-input" autocomplete="off" spellcheck="false">
      </div>

      <div id="feedback"></div>
      <button id="next-btn" class="btn-primary hidden">次へ</button>
      <button class="btn-secondary back-to-menu-btn btn-interrupt">中断してメニューに戻る</button>
    </div>

    <div id="result-screen" class="hidden">
      <h2>🎉 テスト終了！</h2>
      <p class="result-score-text">正解数: <span id="score">0</span> / <span id="total-questions">0</span></p>

      <div id="mistake-log-container" class="hidden">
        <p class="mistake-log-title">今回間違えた単語:</p>
        <div id="mistake-log" class="scroll-box"></div>
      </div>
      <button class="btn-primary back-to-menu-btn">メニューに戻る</button>
    </div>
  </div>

  <div id="print-area"></div>

  <script src="words.js"></script>

  <script>
    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let currentMistakes = [];
    let savedMistakes = JSON.parse(localStorage.getItem("mistakeWords")) || [];
    let isSpartaMode = false;

    const menuScreen = document.getElementById('menu-screen');
    const playScreen = document.getElementById('play-screen');
    const resultScreen = document.getElementById('result-screen');
    const wordListScreen = document.getElementById('word-list-screen');

    const resumeBtn = document.getElementById('resume-btn');
    const startAllBtn = document.getElementById('start-all-btn');
    const startMistakeBtn = document.getElementById('start-mistake-btn');
    const startSpartaBtn = document.getElementById('start-sparta-btn');
    const clearMistakeBtn = document.getElementById('clear-mistake-btn');
    const viewListBtn = document.getElementById('view-list-btn');
    const nextBtn = document.getElementById('next-btn');
    const printBtn = document.getElementById('print-btn');

    const enInput = document.getElementById('en-input');
    const visualText = document.getElementById('visual-text');
    const jaText = document.getElementById('ja-text');
    const progressText = document.getElementById('progress');
    const feedbackText = document.getElementById('feedback');
    const mistakeCountSpan = document.getElementById('mistake-count');
    const tracingToggle = document.getElementById('tracing-mode-toggle');
    const playOrderSelect = document.getElementById('play-order');

    const backButtons = document.querySelectorAll('.back-to-menu-btn');

    function initMenu() {
      isSpartaMode = false;
      if (typeof allWords !== 'undefined') {
        document.getElementById('total-word-count').innerText = allWords.length;
      } else {
        document.getElementById('total-word-count').innerText = "エラー: words.jsが見つかりません";
      }

      updateMistakeUI();

      const session = JSON.parse(localStorage.getItem('savedSession'));
      if (session && session.index > 0 && session.index < session.questions.length) {
        resumeBtn.classList.remove('hidden');
        resumeBtn.innerText = `▶ 続きから再開 (${session.index + 1}問目から)`;
      } else {
        resumeBtn.classList.add('hidden');
      }

      document.getElementById('app-container').style.animation = 'none';
      setTimeout(() => document.getElementById('app-container').style.animation = 'fadeIn 0.5s ease-out', 10);

      menuScreen.classList.remove('hidden');
      playScreen.classList.add('hidden');
      resultScreen.classList.add('hidden');
      wordListScreen.classList.add('hidden');
    }

    function updateMistakeUI() {
      mistakeCountSpan.innerText = savedMistakes.length;
      if (savedMistakes.length > 0) {
        startMistakeBtn.disabled = false;
        clearMistakeBtn.classList.remove('hidden');
      } else {
        startMistakeBtn.disabled = true;
        clearMistakeBtn.classList.add('hidden');
      }
    }

    function showWordList() {
      const tbody = document.getElementById('word-list-tbody');
      tbody.innerHTML = '';
      if (typeof allWords !== 'undefined') {
        allWords.forEach((word, index) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${index + 1}</td><td>${word.en}</td><td>${word.ja}</td>`;
          tbody.appendChild(tr);
        });
      }
      menuScreen.classList.add('hidden');
      wordListScreen.classList.remove('hidden');
    }

    function saveSession() {
      if (!isSpartaMode && currentQuestions.length > 0 && currentIndex < currentQuestions.length) {
        localStorage.setItem('savedSession', JSON.stringify({
          questions: currentQuestions, index: currentIndex, score: score, mistakes: currentMistakes
        }));
      }
    }

    function startGame(mode) {
      isSpartaMode = (mode === 'sparta');

      if (mode === 'resume') {
        const session = JSON.parse(localStorage.getItem('savedSession'));
        if (session) {
          currentQuestions = session.questions; currentIndex = session.index;
          score = session.score; currentMistakes = session.mistakes;
        }
      } else {
        if (localStorage.getItem('savedSession')) {
          if (!confirm('保存されている途中のデータはリセットされますが、最初からスタートしますか？')) return;
        }

        if (mode === 'all' || mode === 'sparta') {
          currentQuestions = [...allWords];
        } else if (mode === 'mistake') {
          currentQuestions = [...savedMistakes];
        }

        if (mode !== 'sparta' && playOrderSelect.value === 'random') {
          currentQuestions.sort(() => Math.random() - 0.5);
        }

        currentIndex = 0; score = 0; currentMistakes = [];
        localStorage.removeItem('savedSession');
      }

      document.getElementById('app-container').style.animation = 'none';
      setTimeout(() => document.getElementById('app-container').style.animation = 'fadeIn 0.4s ease-out', 10);

      menuScreen.classList.add('hidden');
      playScreen.classList.remove('hidden');
      showQuestion();
    }

    function updateVisualText() {
      if (!currentQuestions[currentIndex]) return;
      const targetStr = currentQuestions[currentIndex].en;
      const typedStr = enInput.value;
      const isTracing = tracingToggle.checked;
      const isFocused = document.activeElement === enInput && !enInput.disabled;

      let html = "";
      if (typedStr === "" && !isTracing && !isFocused) {
        html = `<span class="placeholder-part">英語を入力 (Enterで判定)</span>`;
      } else {
        html += `<span class="typed-part">${typedStr}</span>`;
        if (isFocused) html += `<span class="fake-cursor"></span>`;
        if (isTracing && targetStr.length > typedStr.length) {
          html += `<span class="ghost-part">${targetStr.substring(typedStr.length)}</span>`;
        }
      }
      visualText.innerHTML = html;
    }

    function showQuestion() {
      saveSession();
      feedbackText.innerText = ""; feedbackText.className = ""; enInput.value = ""; enInput.disabled = false;
      nextBtn.classList.add('hidden');

      const progressPrefix = isSpartaMode ? "☠️ スパルタ " : "問題 ";
      progressText.innerText = `${progressPrefix}${currentIndex + 1} / ${currentQuestions.length}`;
      jaText.innerText = currentQuestions[currentIndex].ja;

      updateVisualText();
      setTimeout(() => enInput.focus(), 50);
    }

    function checkAnswer() {
      const userAnswer = enInput.value.trim().toLowerCase();
      const correctAnswer = currentQuestions[currentIndex].en.toLowerCase();
      const isTracing = tracingToggle.checked;

      enInput.disabled = true;
      updateVisualText();

      if (userAnswer === correctAnswer) {
        feedbackText.innerHTML = "⭕ 正解！"; feedbackText.className = "correct"; score++;
        if (!isTracing) {
          savedMistakes = savedMistakes.filter(w => w.en !== currentQuestions[currentIndex].en);
          localStorage.setItem("mistakeWords", JSON.stringify(savedMistakes));
        }
        setTimeout(nextQuestion, 600);
      } else {
        feedbackText.innerHTML = `❌ 違うよ！<br>正解は： <strong class="correct-word">${currentQuestions[currentIndex].en}</strong>`;
        feedbackText.className = "incorrect";

        if (!isTracing) {
          const isAlreadyMistaken = savedMistakes.some(w => w.en === currentQuestions[currentIndex].en);
          if (!isAlreadyMistaken) {
            savedMistakes.push(currentQuestions[currentIndex]);
            localStorage.setItem("mistakeWords", JSON.stringify(savedMistakes));
          }
          currentMistakes.push(currentQuestions[currentIndex]);
        }

        if (isSpartaMode) {
          feedbackText.innerHTML += `<br><span class="sparta-alert">☠️ スパルタ発動！最初からやり直し！</span>`;
          setTimeout(() => { currentIndex = 0; score = 0; showQuestion(); }, 2000);
        } else {
          nextBtn.classList.remove('hidden'); nextBtn.focus();
        }
      }
    }

    function nextQuestion() {
      currentIndex++;
      if (currentIndex < currentQuestions.length) { showQuestion(); } else { showResult(); }
    }

    function showResult() {
      localStorage.removeItem('savedSession');
      document.getElementById('app-container').style.animation = 'none';
      setTimeout(() => document.getElementById('app-container').style.animation = 'fadeIn 0.5s ease-out', 10);

      playScreen.classList.add('hidden'); resultScreen.classList.remove('hidden');
      document.getElementById('score').innerText = score;
      document.getElementById('total-questions').innerText = currentQuestions.length;

      const mistakeLogContainer = document.getElementById('mistake-log-container');
      const mistakeLog = document.getElementById('mistake-log');

      if (currentMistakes.length > 0) {
        mistakeLogContainer.classList.remove('hidden');
        mistakeLog.innerHTML = currentMistakes.map(w => `${w.ja} <br>→ <strong class="mistake-word">${w.en}</strong>`).join('<hr class="mistake-separator">');
      } else {
        mistakeLogContainer.classList.add('hidden');
      }
    }

    // ★ 印刷処理（全体のサイズをさらに少し小さく圧縮！）
    printBtn.addEventListener('click', () => {
      const scope = document.getElementById('print-scope').value;
      const showAnswers = document.getElementById('print-answers-toggle').checked;
      let targetWords = scope === 'all' ? [...allWords] : [...savedMistakes];

      if (targetWords.length === 0) {
        alert('印刷する単語がありません！（間違いリストが空です）');
        return;
      }

      const renderAnswer = (word) => {
        if (showAnswers) {
          return `<span style="color: #d32f2f;">${word.en}</span>`;
        }
        let match = word.ja.match(/【(\d+)語】/);
        if (match) {
          let count = parseInt(match[1]);
          let brackets = [];
          for (let k = 0; k < count; k++) {
            let spaces = count >= 4 ? '&nbsp;' : '&nbsp;&nbsp;&nbsp;&nbsp;';
            brackets.push(`(${spaces})`);
          }
          // カッコのサイズも少し小さく調整
          return `<div style="font-weight: normal; font-size: 10.5px; color: #777; display: flex; flex-wrap: wrap; justify-content: center; gap: 4px;">${brackets.join('')}</div>`;
        }
        return '';
      };

      const printArea = document.getElementById('print-area');
      let html = '';

      // --- 1ページ目 (表：1〜60) ---
      html += `
        <div class="print-page">
          ${showAnswers ? '<div style="text-align:right; font-weight:bold; margin-bottom:5px;">【解答】</div>' : ''}
          <div class="print-flex-container">
      `;

      // 1列目 (1~30)
      html += `<table class="print-table"><thead><tr><th>No</th><th>日本語</th><th>解答欄</th></tr></thead><tbody>`;
      for (let i = 0; i < 30 && i < targetWords.length; i++) {
        html += `<tr><td>${i + 1}</td><td>${targetWords[i].ja}</td><td>${renderAnswer(targetWords[i])}</td></tr>`;
      }
      html += `</tbody></table>`;

      // 2列目 (31~60)
      html += `<table class="print-table"><thead><tr><th>No</th><th>日本語</th><th>解答欄</th></tr></thead><tbody>`;
      for (let i = 30; i < 60 && i < targetWords.length; i++) {
        html += `<tr><td>${i + 1}</td><td>${targetWords[i].ja}</td><td>${renderAnswer(targetWords[i])}</td></tr>`;
      }
      html += `</tbody></table></div></div>`;

      // --- 2ページ目 (裏：61〜100) があれば追加 ---
      if (targetWords.length > 60) {
        html += `
          <div class="print-page">
            ${showAnswers ? '<div style="text-align:right; font-weight:bold; margin-bottom:5px;">【解答】</div>' : ''}
            <div class="print-flex-container">
        `;

        const backTotal = targetWords.length - 60;
        const backHalf = Math.ceil(backTotal / 2);

        // 1列目 (61~80)
        html += `<table class="print-table"><thead><tr><th>No</th><th>日本語</th><th>解答欄</th></tr></thead><tbody>`;
        for (let i = 60; i < 60 + backHalf && i < targetWords.length; i++) {
          html += `<tr><td>${i + 1}</td><td>${targetWords[i].ja}</td><td>${renderAnswer(targetWords[i])}</td></tr>`;
        }
        html += `</tbody></table>`;

        // 2列目 (81~100)
        html += `<table class="print-table"><thead><tr><th>No</th><th>日本語</th><th>解答欄</th></tr></thead><tbody>`;
        for (let i = 60 + backHalf; i < targetWords.length; i++) {
          html += `<tr><td>${i + 1}</td><td>${targetWords[i].ja}</td><td>${renderAnswer(targetWords[i])}</td></tr>`;
        }
        html += `</tbody></table></div></div>`;
      }

      printArea.innerHTML = html;
      window.print();
    });

    resumeBtn.addEventListener('click', () => startGame('resume'));
    startAllBtn.addEventListener('click', () => startGame('all'));
    startMistakeBtn.addEventListener('click', () => startGame('mistake'));
    startSpartaBtn.addEventListener('click', () => startGame('sparta'));
    viewListBtn.addEventListener('click', showWordList);
    nextBtn.addEventListener('click', nextQuestion);

    backButtons.forEach(btn => { btn.addEventListener('click', initMenu); });

    clearMistakeBtn.addEventListener('click', () => {
      if (confirm('間違いリストをすべてリセットしてもいい？')) {
        savedMistakes = []; localStorage.removeItem("mistakeWords"); updateMistakeUI();
      }
    });

    enInput.addEventListener('input', updateVisualText);
    enInput.addEventListener('focus', updateVisualText);
    enInput.addEventListener('blur', updateVisualText);
    tracingToggle.addEventListener('change', updateVisualText);

    enInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && enInput.value.trim() !== "") checkAnswer();
    });

    window.onload = () => { initMenu(); };
  </script>
</body>

</html>
